<html>
    <head>
        <title>
            Event Demo
        </title>
        <style>
            #msg {
                width: 200px;
                height: 200px;
                background-color: blueviolet;
            }
        </style>
    </head>
    <body>
        <div id="msg">
            This is a message box.
        </div>
        <script>
            document.getElementById("msg").addEventListener('mouseover',mouseHandler);
            document.getElementById("msg").addEventListener('mouseout',mouseOutHandler);

            function mouseOutHandler(){
                let div =document.getElementById("msg");
                div.style.backgroundColor = "blueviolet";

            }
            function mouseHandler(){
                let div =document.getElementById("msg");
                div.style.backgroundColor = "green";

            }
            </script>
    </body>
</html>
