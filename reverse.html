<html>

<head>
    <title>
        Reverse name
    </title>
    <script>
        function reverseName(fullname) {
            let firstname = "";
            let lastname = "";
            let spacefound = false;
            for (let i = 0; i < fullname.length; i++) {
                let char = fullname[i];
                if (char == " ") {
                    if (firstname != "" && !spacefound) {
                        spacefound = true;
                    }
                } else {
                    if (!spacefound) {
                        firstname += char;
                    } else {
                        lastname += char;
                    }
                }
            }
            return lastname + " " + firstname;
        }
        let userInput = prompt("Firstname Lastname: ");
        let output = reverseName(userInput);
        alert(output);
    </script>
</head>

</html>
